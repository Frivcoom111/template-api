$kind: http-request
name: Create Product
order: 2000
url: '{{baseURL}}/cart'
method: POST
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{userToken}}'
body:
  type: json
  content: |-
    {
      "productId": "ee0c3a04-0e05-4a83-8bd2-4ffd93f5c6fc",
      "quantity": 1
    }
