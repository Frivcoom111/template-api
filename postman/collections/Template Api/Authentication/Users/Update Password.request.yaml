$kind: http-request
name: Update Password
order: 3000
url: '{{baseURL}}/users/update/password'
method: PATCH
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{userToken}}'
body:
  type: json
  content: |-
    {
      "currentPassword": "12345678",
      "newPassword": "123456789"
    }
