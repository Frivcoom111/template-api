$kind: http-request
name: Login - USER
order: 2000
url: '{{baseURL}}/auth/login'
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "carlos.eduardo3.tolentino@gmail.com",
      "password": "12345678"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json && json.token) {
        pm.environment.set("userToken", json.token);
      }
